<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promizio — Log in</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F0F0F'/><text y='.9em' font-size='72' x='12' fill='%2352B788' font-family='serif' font-weight='700'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:     #0F0F0F;
  --sage:    #2D6A4F;
  --sage-lt: #52B788;
  --warm:    #F9F4EE;
  --sand:    #E8E0D4;
  --white:   #FFFFFF;
  --gray:    #6B6B6B;
  --red:     #DC2626;
}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--warm);
  color: var(--ink);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
nav {
  padding: 1.25rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--white);
  border-bottom: 1px solid var(--sand);
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem; font-weight: 700;
  color: var(--ink); text-decoration: none;
  letter-spacing: -0.03em;
}
.logo span { color: var(--sage-lt); }
.nav-link { font-size: 0.875rem; color: var(--gray); text-decoration: none; }
.nav-link:hover { color: var(--ink); }

main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 2rem;
}
.card {
  background: var(--white);
  border: 1px solid var(--sand);
  border-radius: 20px;
  padding: 2.5rem;
  width: 100%; max-width: 420px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
.card-title {
  font-family: 'Fraunces', serif;
  font-size: 1.75rem; font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 0.4rem;
}
.card-sub {
  font-size: 0.875rem; color: var(--gray);
  margin-bottom: 2rem; line-height: 1.5;
}
.card-sub a { color: var(--sage); text-decoration: none; font-weight: 500; }
.card-sub a:hover { text-decoration: underline; }

.field { margin-bottom: 1.25rem; }
label {
  display: block; font-size: 0.8rem; font-weight: 600;
  margin-bottom: 0.4rem; color: var(--ink);
}
input[type="email"], input[type="password"] {
  width: 100%; padding: 0.85rem 1rem;
  border: 1.5px solid var(--sand);
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.9rem; color: var(--ink);
  background: var(--white);
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--sage-lt); }
input.error { border-color: var(--red); }

.forgot { display: block; text-align: right; font-size: 0.78rem; color: var(--gray); text-decoration: none; margin-top: 0.4rem; }
.forgot:hover { color: var(--sage); }

.btn {
  width: 100%; padding: 0.9rem;
  background: var(--sage);
  color: var(--white);
  border: none; border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  margin-top: 0.5rem;
}
.btn:hover { background: var(--sage-lt); color: var(--ink); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg {
  display: none; background: #FEF2F2;
  border: 1px solid #FECACA; border-radius: 8px;
  padding: 0.75rem 1rem; font-size: 0.85rem;
  color: var(--red); margin-bottom: 1rem;
}
.divider {
  text-align: center; font-size: 0.78rem;
  color: var(--gray); margin: 1.5rem 0 0;
}
.divider a { color: var(--sage); text-decoration: none; font-weight: 500; }
.divider a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Promiz<span>io</span></a>
  <a href="/signup.html" class="nav-link">No account? Sign up →</a>
</nav>

<main>
  <div class="card">
    <h1 class="card-title">Welcome back.</h1>
    <p class="card-sub">Don't have an account? <a href="/signup.html">Sign up free</a></p>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@yourcompany.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <a href="/forgot.html" class="forgot">Forgot password?</a>
      </div>
      <button type="submit" class="btn" id="submit-btn">Log in</button>
    </form>

    <p class="divider">New to Promizio? <a href="/signup.html">Create a free account</a></p>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://usewjkpcpionmapqxvoz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_60i4tQGeBhRNwwtImJ8SRQ_F-9doWcY';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Redirect if already logged in
supabase.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = '/dashboard.html';
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errorMsg = document.getElementById('error-msg');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btn.textContent = 'Logging in...';
  btn.disabled = true;
  errorMsg.style.display = 'none';

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    errorMsg.textContent = 'Incorrect email or password. Please try again.';
    errorMsg.style.display = 'block';
    btn.textContent = 'Log in';
    btn.disabled = false;
  } else {
    window.location.href = '/dashboard.html';
  }
});
</script>
</body>
</html>
