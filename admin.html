<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promizio — Admin</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F0F0F'/><text y='.9em' font-size='72' x='12' fill='%2352B788' font-family='serif' font-weight='700'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0F0F0F;--sage:#2D6A4F;--sage-lt:#52B788;--sage-bg:#F0FAF4;
  --warm:#F9F4EE;--sand:#E8E0D4;--white:#FFFFFF;
  --gray:#6B6B6B;--gray-lt:#A8A8A8;--red:#DC2626;
  --amber:#854F0B;--amber-bg:#FAEEDA;--sidebar:#0F0F0F;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--warm);color:var(--ink);min-height:100vh;}

/* ── LOGIN SCREEN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--sidebar);}
.login-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;}
.login-logo{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--white);letter-spacing:-0.03em;text-align:center;margin-bottom:0.25rem;}
.login-logo span{color:var(--sage-lt);}
.login-sub{text-align:center;font-size:0.8rem;color:rgba(255,255,255,0.3);margin-bottom:2rem;letter-spacing:0.05em;text-transform:uppercase;}
.login-box input{width:100%;padding:0.85rem 1rem;border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;background:rgba(255,255,255,0.07);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;outline:none;margin-bottom:0.75rem;}
.login-box input:focus{border-color:var(--sage-lt);}
.login-box input::placeholder{color:rgba(255,255,255,0.25);}
.login-btn{width:100%;padding:0.9rem;background:var(--sage);color:var(--white);border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s;}
.login-btn:hover{background:var(--sage-lt);color:var(--ink);}
.login-err{font-size:0.8rem;color:#F09595;text-align:center;margin-top:0.75rem;display:none;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;display:none;}
#app.visible{display:flex;}
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;padding:1.5rem 0;position:fixed;top:0;left:0;bottom:0;}
.sidebar-logo{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:var(--white);letter-spacing:-0.03em;padding:0 1.25rem 0.25rem;}
.sidebar-logo span{color:var(--sage-lt);}
.sidebar-badge{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:0 1.25rem 1.5rem;}
.nav-item{display:flex;align-items:center;gap:10px;padding:0.65rem 1.25rem;font-size:0.85rem;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.15s;border-left:3px solid transparent;user-select:none;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.05);}
.nav-item.active{color:var(--white);border-left-color:var(--sage-lt);background:rgba(82,183,136,0.08);}
.nav-icon{width:18px;text-align:center;font-size:0.9rem;}
.nav-count{margin-left:auto;background:var(--red);color:var(--white);font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.08);font-size:0.75rem;color:rgba(255,255,255,0.25);}
.lock-btn{background:none;border:none;color:rgba(255,255,255,0.25);cursor:pointer;font-size:0.75rem;padding:0;margin-top:0.3rem;font-family:'Plus Jakarta Sans',sans-serif;}
.lock-btn:hover{color:rgba(255,255,255,0.6);}

.main{margin-left:220px;flex:1;padding:2rem 2.5rem;min-height:100vh;}
.page-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:0.25rem;}
.page-sub{font-size:0.85rem;color:var(--gray);margin-bottom:1.75rem;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem;margin-bottom:2rem;}
.stat{background:var(--white);border:1px solid var(--sand);border-radius:12px;padding:1rem 1.25rem;}
.stat-label{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray);margin-bottom:0.4rem;}
.stat-value{font-family:'Fraunces',serif;font-size:1.75rem;font-weight:700;color:var(--ink);line-height:1;}
.stat-sub{font-size:0.7rem;color:var(--gray-lt);margin-top:0.2rem;}

/* Tables */
.table-wrap{background:var(--white);border:1px solid var(--sand);border-radius:16px;overflow:hidden;margin-bottom:1.5rem;}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--sand);}
.table-title{font-size:0.9rem;font-weight:600;}
.table-actions{display:flex;gap:8px;align-items:center;}
.search-input{padding:0.45rem 0.85rem;border:1px solid var(--sand);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;outline:none;width:200px;}
.search-input:focus{border-color:var(--sage-lt);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:0.65rem 1.25rem;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--gray-lt);background:#FAFAF8;border-bottom:1px solid var(--sand);}
td{padding:0.85rem 1.25rem;font-size:0.85rem;border-bottom:0.5px solid var(--sand);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAF8;}

/* Badges */
.badge{display:inline-block;font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:20px;}
.badge-pending{background:#FFFBEB;color:#854F0B;border:1px solid #FDE68A;}
.badge-active{background:var(--sage-bg);color:var(--sage);border:1px solid rgba(45,106,79,0.2);}
.badge-suspended{background:#FEF2F2;color:var(--red);border:1px solid #FECACA;}
.badge-rejected{background:#F1EFE8;color:var(--gray);border:1px solid var(--sand);}
.badge-starter{background:#F1EFE8;color:var(--gray);border:1px solid var(--sand);}
.badge-growth{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4;}
.badge-pro{background:#EEEDFE;color:#534AB7;border:1px solid #CECBF6;}

/* Action buttons */
.btn-sm{padding:0.3rem 0.75rem;border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;border:1px solid var(--sand);background:transparent;color:var(--gray);transition:all 0.15s;}
.btn-sm:hover{background:var(--warm);border-color:var(--ink);color:var(--ink);}
.btn-approve{border-color:rgba(45,106,79,0.3);color:var(--sage);}
.btn-approve:hover{background:var(--sage-bg);border-color:var(--sage);}
.btn-reject{border-color:rgba(220,38,38,0.3);color:var(--red);}
.btn-reject:hover{background:#FEF2F2;border-color:var(--red);}
.btn-primary{padding:0.6rem 1.25rem;background:var(--sage);color:var(--white);border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-primary:hover{background:var(--sage-lt);color:var(--ink);}
.btn-danger{padding:0.6rem 1.25rem;background:transparent;color:var(--red);border:1px solid rgba(220,38,38,0.3);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s;}
.btn-danger:hover{background:#FEF2F2;}

/* Give/Want chips */
.chip-give{display:inline-block;font-size:0.68rem;padding:1px 7px;border-radius:20px;background:var(--sage-bg);color:var(--sage);border:1px solid rgba(45,106,79,0.15);margin:1px;}
.chip-want{display:inline-block;font-size:0.68rem;padding:1px 7px;border-radius:20px;background:#FFFBEB;color:#854F0B;border:1px solid rgba(196,92,38,0.2);margin:1px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px;padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:0.25rem;}
.modal-sub{font-size:0.8rem;color:var(--gray);margin-bottom:1.5rem;}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.25rem;cursor:pointer;color:var(--gray);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.modal-close:hover{background:var(--warm);}
.form-field{margin-bottom:1rem;}
.form-field label{display:block;font-size:0.78rem;font-weight:600;margin-bottom:0.3rem;color:var(--ink);}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:0.7rem 0.9rem;border:1.5px solid var(--sand);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.875rem;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s;appearance:none;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--sage-lt);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.modal-footer{display:flex;gap:0.75rem;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--sand);}
.msg{display:none;font-size:0.8rem;padding:8px 12px;border-radius:6px;margin-bottom:1rem;}
.msg-err{background:#FEF2F2;color:var(--red);border:1px solid #FECACA;}
.msg-ok{background:var(--sage-bg);color:var(--sage);border:1px solid rgba(45,106,79,0.2);}

/* Empty */
.empty-row td{text-align:center;padding:2.5rem;color:var(--gray-lt);font-size:0.875rem;}

/* Give/want detail in modal */
.gw-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:0.5rem;}
.gw-col-title{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;}
.gw-col-title.give{color:#085041;}
.gw-col-title.want{color:#633806;}
.gw-row-give{font-size:0.78rem;padding:4px 8px;background:var(--sage-bg);border:1px solid rgba(45,106,79,0.15);border-radius:6px;margin-bottom:4px;color:var(--sage);}
.gw-row-want{font-size:0.78rem;padding:4px 8px;background:#FFFBEB;border:1px solid rgba(196,92,38,0.2);border-radius:6px;margin-bottom:4px;color:#854F0B;}

.loading{text-align:center;padding:2rem;color:var(--gray-lt);font-size:0.875rem;}
.filter-select{padding:0.4rem 0.75rem;border:1px solid var(--sand);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;outline:none;appearance:none;background:var(--white);color:var(--ink);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Promiz<span>io</span></div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="admin-pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')checkLogin()">
    <button class="login-btn" onclick="checkLogin()">Enter</button>
    <div class="login-err" id="login-err">Incorrect password.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Promiz<span>io</span></div>
    <div class="sidebar-badge">Admin Panel</div>
    <div class="nav-item active" onclick="navTo('overview',this)"><span class="nav-icon">⬡</span> Overview</div>
    <div class="nav-item" onclick="navTo('businesses',this)"><span class="nav-icon">🏢</span> Businesses <span class="nav-count" id="pending-count" style="display:none">0</span></div>
    <div class="nav-item" onclick="navTo('matches',this)"><span class="nav-icon">🔗</span> Matches</div>
    <div class="nav-item" onclick="navTo('campaigns',this)"><span class="nav-icon">📢</span> Campaigns</div>
    <div class="nav-item" onclick="navTo('waitlist',this)"><span class="nav-icon">📋</span> Waitlist</div>
    <div class="sidebar-footer">
      Logged in as admin<br>
      <button class="lock-btn" onclick="lockAdmin()">🔒 Lock panel</button>
    </div>
  </aside>
  <main class="main" id="main-content">
    <div class="loading">Loading...</div>
  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">

  <!-- Business detail / edit modal -->
  <div class="modal" id="modal-biz" style="display:none;">
    <button class="modal-close" onclick="closeAllModals()">×</button>
    <div class="modal-title" id="mbiz-title">Business details</div>
    <div class="modal-sub" id="mbiz-sub"></div>
    <div class="msg msg-err" id="mbiz-err"></div>
    <div class="msg msg-ok"  id="mbiz-ok"></div>
    <div class="form-row">
      <div class="form-field"><label>Business name</label><input type="text" id="mbiz-name"></div>
      <div class="form-field"><label>Website</label><input type="url" id="mbiz-web"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Category</label><input type="text" id="mbiz-cat"></div>
      <div class="form-field"><label>Subcategory</label><input type="text" id="mbiz-sub2"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Business type</label>
        <select id="mbiz-type">
          <option value="local">Local</option>
          <option value="ecommerce">E-commerce</option>
          <option value="both">Both</option>
        </select>
      </div>
      <div class="form-field"><label>Status</label>
        <select id="mbiz-status">
          <option value="pending">Pending</option>
          <option value="active">Active</option>
          <option value="suspended">Suspended</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Plan</label>
        <select id="mbiz-plan">
          <option value="starter">Starter</option>
          <option value="growth">Growth</option>
          <option value="pro">Pro</option>
        </select>
      </div>
      <div class="form-field"><label>Target market</label><input type="text" id="mbiz-market"></div>
    </div>
    <div class="form-field"><label>Description</label><textarea id="mbiz-desc" rows="2"></textarea></div>
    <div class="form-field"><label>Contact email</label><input type="text" id="mbiz-email" readonly style="background:#FAFAF8;color:var(--gray-lt)"></div>

    <!-- Give/Want display -->
    <div class="form-field" id="mbiz-gw-section">
      <label>What they offer &amp; want</label>
      <div class="gw-grid">
        <div>
          <div class="gw-col-title give">Can GIVE</div>
          <div id="mbiz-give"></div>
        </div>
        <div>
          <div class="gw-col-title want">Wants to GET</div>
          <div id="mbiz-want"></div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-primary" onclick="saveBizEdit()">Save changes</button>
      <button class="btn-danger" onclick="deleteBiz()">Delete account</button>
      <button class="btn-sm" style="margin-left:auto;" onclick="closeAllModals()">Cancel</button>
    </div>
  </div>

  <!-- Create match modal -->
  <div class="modal" id="modal-match" style="display:none;">
    <button class="modal-close" onclick="closeAllModals()">×</button>
    <div class="modal-title">Create a match</div>
    <div class="modal-sub">Manually pair two businesses for cross-promotion.</div>
    <div class="msg msg-err" id="mmatch-err"></div>
    <div class="msg msg-ok"  id="mmatch-ok"></div>
    <div class="form-field">
      <label>Business A</label>
      <select id="mmatch-a"><option value="">Select business...</option></select>
    </div>
    <div class="form-field">
      <label>Business B</label>
      <select id="mmatch-b"><option value="">Select business...</option></select>
    </div>
    <div class="form-field">
      <label>Match reason <span style="font-weight:400;color:var(--gray-lt)">(shown to both businesses)</span></label>
      <textarea id="mmatch-reason" rows="2" placeholder="e.g. Both serve women 25-40 in Denmark interested in wellness. A offers in-box space, B offers email reach."></textarea>
    </div>
    <div class="form-field">
      <label>Match score (0–100)</label>
      <input type="number" id="mmatch-score" value="85" min="0" max="100">
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="createMatch()">Create match</button>
      <button class="btn-sm" onclick="closeAllModals()">Cancel</button>
    </div>
  </div>

</div>

<script>
var SB_URL='https://usewjkpcpionmapqxvoz.supabase.co';
var SB_KEY='sb_publishable_60i4tQGeBhRNwwtImJ8SRQ_F-9doWcY';
var ADMIN_PW='Solskin#123!JaTak?';
var sb, allBiz=[], editingBizId=null;

var GIVE_LABELS={
  give_inbox:'📦 Space in boxes',give_samples:'🎁 Physical samples',
  give_email:'📧 Email newsletter',give_social:'📱 Social shoutout',
  give_coupon:'🎟️ Coupon in packaging',give_instore:'🏪 In-store promo',
  give_backlink:'🔗 Backlink',give_blogpost:'✍️ Blog / content'
};
var WANT_LABELS={
  want_inbox:'📦 Box space',want_samples:'🎁 Sample distribution',
  want_email:'📧 Email mention',want_social:'📱 Social shoutout',
  want_coupon:'🎟️ Coupon in orders',want_instore:'🏪 In-store promo',
  want_backlink:'🔗 Backlink',want_blogpost:'✍️ Blog / content'
};

// ── AUTH ──────────────────────────────────────────────────────
function checkLogin() {
  var pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    sessionStorage.setItem('promizio_admin', '1');
    loadSupabase();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('admin-pw').value = '';
  }
}

function lockAdmin() {
  sessionStorage.removeItem('promizio_admin');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-pw').value = '';
}

// Check if already logged in this session
if (sessionStorage.getItem('promizio_admin') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}

function loadSupabase() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
  s.onload = function() {
    sb = window.supabase.createClient(SB_URL, SB_KEY);
    loadAllData();
  };
  document.head.appendChild(s);
}

if (sessionStorage.getItem('promizio_admin') === '1') { loadSupabase(); }

// ── DATA ──────────────────────────────────────────────────────
async function loadAllData() {
  var r = await sb.from('businesses').select('*').order('created_at', {ascending:false});
  allBiz = r.data || [];
  var pending = allBiz.filter(function(b){return b.status==='pending';}).length;
  var pc = document.getElementById('pending-count');
  if (pending > 0) { pc.textContent = pending; pc.style.display = 'inline'; }
  else { pc.style.display = 'none'; }
  renderOverview();
}

// ── NAV ───────────────────────────────────────────────────────
function navTo(page, el) {
  document.querySelectorAll('.nav-item').forEach(function(i){i.classList.remove('active');});
  if(el) el.classList.add('active');
  if(page==='overview')   renderOverview();
  if(page==='businesses') renderBusinesses();
  if(page==='matches')    renderMatches();
  if(page==='campaigns')  renderCampaigns();
  if(page==='waitlist')   renderWaitlist();
}

// ── OVERVIEW ──────────────────────────────────────────────────
function renderOverview() {
  var total   = allBiz.length;
  var active  = allBiz.filter(function(b){return b.status==='active';}).length;
  var pending = allBiz.filter(function(b){return b.status==='pending';}).length;
  var growth  = allBiz.filter(function(b){return b.plan==='growth';}).length;
  var pro     = allBiz.filter(function(b){return b.plan==='pro';}).length;
  var mrr     = (growth*49)+(pro*149);

  document.getElementById('main-content').innerHTML =
    '<h1 class="page-title">Overview</h1>'+
    '<p class="page-sub">Platform at a glance — updated in real time.</p>'+
    '<div class="stats-row">'+
      stat('Total businesses', total, 'All time')+
      stat('Active', active, 'Approved & live')+
      stat('Pending', pending, 'Awaiting review', pending>0?'color:var(--amber)':'')+
      stat('Paying', growth+pro, 'Growth + Pro')+
      stat('MRR', '€'+mrr, 'Monthly recurring')+
    '</div>'+

    '<div class="table-wrap">'+
      '<div class="table-head"><span class="table-title">Recent signups</span>'+
        '<button class="btn-primary" style="font-size:0.8rem;padding:0.45rem 1rem;" onclick="navTo(\'businesses\',document.querySelectorAll(\'.nav-item\')[1])">View all →</button>'+
      '</div>'+
      '<table><thead><tr>'+
        '<th>Business</th><th>Category</th><th>Type</th><th>Status</th><th>Joined</th><th></th>'+
      '</tr></thead><tbody>'+
      (allBiz.length===0?'<tr class="empty-row"><td colspan="6">No businesses yet</td></tr>':
        allBiz.slice(0,8).map(function(b){return bizRow(b);}).join(''))+
      '</tbody></table>'+
    '</div>';
}

function stat(label, value, sub, style) {
  return '<div class="stat"><div class="stat-label">'+label+'</div>'+
    '<div class="stat-value"'+(style?' style="'+style+'"':'')+'>'+value+'</div>'+
    '<div class="stat-sub">'+sub+'</div></div>';
}

// ── BUSINESSES ────────────────────────────────────────────────
function renderBusinesses(filter, search) {
  filter = filter || 'all';
  search = (search||'').toLowerCase();
  var filtered = allBiz.filter(function(b){
    var matchFilter = filter==='all' || b.status===filter;
    var matchSearch = !search || (b.name||'').toLowerCase().includes(search) || (b.category||'').toLowerCase().includes(search) || (b.contact_email||'').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  document.getElementById('main-content').innerHTML =
    '<h1 class="page-title">Businesses</h1>'+
    '<p class="page-sub">All registered businesses. Click a row to view, edit, approve or delete.</p>'+
    '<div class="table-wrap">'+
      '<div class="table-head">'+
        '<span class="table-title">'+allBiz.length+' total</span>'+
        '<div class="table-actions">'+
          '<select class="filter-select" onchange="renderBusinesses(this.value,document.getElementById(\'biz-search\').value)">'+
            '<option value="all">All statuses</option>'+
            '<option value="pending">Pending</option>'+
            '<option value="active">Active</option>'+
            '<option value="suspended">Suspended</option>'+
            '<option value="rejected">Rejected</option>'+
          '</select>'+
          '<input class="search-input" id="biz-search" placeholder="Search name, category..." value="'+search+'" oninput="renderBusinesses(document.querySelector(\'.filter-select\').value,this.value)">'+
        '</div>'+
      '</div>'+
      '<table><thead><tr>'+
        '<th>Business</th><th>Category</th><th>Type</th><th>Offers / Wants</th><th>Plan</th><th>Status</th><th>Joined</th><th></th>'+
      '</tr></thead><tbody>'+
      (filtered.length===0?'<tr class="empty-row"><td colspan="8">No businesses found</td></tr>':
        filtered.map(function(b){return bizRowFull(b);}).join(''))+
      '</tbody></table>'+
    '</div>';
}

function bizRow(b) {
  return '<tr style="cursor:pointer" onclick="openBizModal(\''+b.id+'\')">'+
    '<td><strong>'+esc(b.name||'—')+'</strong><br><span style="font-size:0.75rem;color:var(--gray-lt)">'+esc(b.contact_email||'')+'</span></td>'+
    '<td>'+esc(b.category||'—')+'</td>'+
    '<td>'+esc(b.business_type||'—')+'</td>'+
    '<td><span class="badge badge-'+b.status+'">'+b.status+'</span></td>'+
    '<td style="font-size:0.78rem;color:var(--gray-lt)">'+fmtDate(b.created_at)+'</td>'+
    '<td>'+quickActions(b)+'</td>'+
  '</tr>';
}

function bizRowFull(b) {
  var gives = (b.give_details||[]).map(function(g){return '<span class="chip-give">'+(GIVE_LABELS[g.type]||g.type)+'</span>';}).join('');
  var wants = (b.want_types||[]).map(function(t){return '<span class="chip-want">'+(WANT_LABELS[t]||t)+'</span>';}).join('');
  return '<tr style="cursor:pointer" onclick="openBizModal(\''+b.id+'\')">'+
    '<td><strong>'+esc(b.name||'—')+'</strong><br><span style="font-size:0.75rem;color:var(--gray-lt)">'+esc(b.contact_email||'')+'</span></td>'+
    '<td><span style="font-size:0.82rem">'+esc(b.category||'—')+'</span>'+(b.subcategory?'<br><span style="font-size:0.72rem;color:var(--gray-lt)">'+esc(b.subcategory)+'</span>':'')+' </td>'+
    '<td><span style="font-size:0.78rem">'+esc(b.business_type||'—')+'</span></td>'+
    '<td style="max-width:200px;">'+(gives||'<span style="color:var(--gray-lt);font-size:0.75rem">—</span>')+'<br>'+(wants||'')+'</td>'+
    '<td><span class="badge badge-'+(b.plan||'starter')+'">'+(b.plan||'starter')+'</span></td>'+
    '<td><span class="badge badge-'+b.status+'">'+b.status+'</span></td>'+
    '<td style="font-size:0.75rem;color:var(--gray-lt)">'+fmtDate(b.created_at)+'</td>'+
    '<td>'+quickActions(b)+'</td>'+
  '</tr>';
}

function quickActions(b) {
  var html = '';
  if (b.status === 'pending') {
    html += '<button class="btn-sm btn-approve" onclick="event.stopPropagation();quickApprove(\''+b.id+'\')">Approve</button> ';
    html += '<button class="btn-sm btn-reject"  onclick="event.stopPropagation();quickReject(\''+b.id+'\')">Reject</button>';
  }
  return html;
}

async function quickApprove(id) {
  await sb.from('businesses').update({status:'active'}).eq('id',id);
  await loadAllData();
  renderBusinesses();
}

async function quickReject(id) {
  await sb.from('businesses').update({status:'rejected'}).eq('id',id);
  await loadAllData();
  renderBusinesses();
}

// ── BIZ MODAL ─────────────────────────────────────────────────
function openBizModal(id) {
  var b = allBiz.find(function(x){return x.id===id;});
  if (!b) return;
  editingBizId = id;

  document.getElementById('mbiz-title').textContent = b.name || 'Business details';
  document.getElementById('mbiz-sub').textContent = 'ID: '+id+' · Joined '+fmtDate(b.created_at);
  document.getElementById('mbiz-name').value = b.name||'';
  document.getElementById('mbiz-web').value  = b.website||'';
  document.getElementById('mbiz-cat').value  = b.category||'';
  document.getElementById('mbiz-sub2').value = b.subcategory||'';
  document.getElementById('mbiz-type').value = b.business_type||'local';
  document.getElementById('mbiz-status').value = b.status||'pending';
  document.getElementById('mbiz-plan').value   = b.plan||'starter';
  document.getElementById('mbiz-market').value = b.target_location||'';
  document.getElementById('mbiz-desc').value   = b.description||'';
  document.getElementById('mbiz-email').value  = b.contact_email||'';

  // Give/want
  var gives = (b.give_details||[]).map(function(g){
    return '<div class="gw-row-give">'+(GIVE_LABELS[g.type]||g.type)+(g.volume?' · <em>'+g.volume+'</em>':'')+'</div>';
  }).join('') || '<div style="font-size:0.78rem;color:var(--gray-lt)">None set</div>';
  var wants = (b.want_types||[]).map(function(t){
    return '<div class="gw-row-want">'+(WANT_LABELS[t]||t)+'</div>';
  }).join('') || '<div style="font-size:0.78rem;color:var(--gray-lt)">None set</div>';
  document.getElementById('mbiz-give').innerHTML = gives;
  document.getElementById('mbiz-want').innerHTML = wants;

  document.getElementById('mbiz-err').style.display='none';
  document.getElementById('mbiz-ok').style.display='none';
  showModal('modal-biz');
}

async function saveBizEdit() {
  var err = document.getElementById('mbiz-err');
  var ok  = document.getElementById('mbiz-ok');
  err.style.display='none'; ok.style.display='none';
  var r = await sb.from('businesses').update({
    name:            document.getElementById('mbiz-name').value.trim(),
    website:         document.getElementById('mbiz-web').value.trim()||null,
    category:        document.getElementById('mbiz-cat').value.trim(),
    subcategory:     document.getElementById('mbiz-sub2').value.trim()||null,
    business_type:   document.getElementById('mbiz-type').value,
    status:          document.getElementById('mbiz-status').value,
    plan:            document.getElementById('mbiz-plan').value,
    target_location: document.getElementById('mbiz-market').value.trim()||null,
    description:     document.getElementById('mbiz-desc').value.trim()||null,
  }).eq('id', editingBizId);
  if (r.error) { err.textContent='Save failed: '+r.error.message; err.style.display='block'; return; }
  ok.textContent='✓ Changes saved'; ok.style.display='block';
  await loadAllData();
  setTimeout(closeAllModals, 1200);
}

async function deleteBiz() {
  if (!confirm('Permanently delete this business account? This cannot be undone.')) return;
  if (!confirm('Are you sure? All their data will be deleted.')) return;
  await sb.from('businesses').delete().eq('id', editingBizId);
  await loadAllData();
  closeAllModals();
  renderBusinesses();
}

// ── MATCHES ───────────────────────────────────────────────────
async function renderMatches() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Loading matches...</div>';
  var r = await sb.from('matches').select('*').order('created_at',{ascending:false});
  var matches = r.data || [];

  var html =
    '<h1 class="page-title">Matches</h1>'+
    '<p class="page-sub">All business pairings — manual and AI-generated.</p>'+
    '<div style="margin-bottom:1rem;">'+
      '<button class="btn-primary" onclick="openMatchModal()">+ Create manual match</button>'+
    '</div>'+
    '<div class="table-wrap">'+
      '<div class="table-head"><span class="table-title">'+matches.length+' matches</span></div>'+
      '<table><thead><tr>'+
        '<th>Business A</th><th>Business B</th><th>Score</th><th>Initiated by</th><th>Status</th><th>Created</th><th></th>'+
      '</tr></thead><tbody>'+
      (matches.length===0?'<tr class="empty-row"><td colspan="7">No matches yet. Create the first one above.</td></tr>':
        matches.map(function(m){
          var a = allBiz.find(function(b){return b.id===m.business_a_id;})||{name:'Unknown'};
          var b = allBiz.find(function(b){return b.id===m.business_b_id;})||{name:'Unknown'};
          return '<tr>'+
            '<td><strong>'+esc(a.name)+'</strong><br><span style="font-size:0.72rem;color:var(--gray-lt)">'+esc(a.category||'')+'</span></td>'+
            '<td><strong>'+esc(b.name)+'</strong><br><span style="font-size:0.72rem;color:var(--gray-lt)">'+esc(b.category||'')+'</span></td>'+
            '<td><strong style="color:var(--sage-lt)">'+(m.match_score||'—')+'</strong></td>'+
            '<td style="font-size:0.8rem">'+esc(m.initiated_by||'—')+'</td>'+
            '<td><span class="badge badge-'+(m.status==='active'?'active':'pending')+'">'+m.status+'</span></td>'+
            '<td style="font-size:0.75rem;color:var(--gray-lt)">'+fmtDate(m.created_at)+'</td>'+
            '<td><button class="btn-sm btn-reject" onclick="deleteMatch(\''+m.id+'\')">Delete</button></td>'+
          '</tr>';
        }).join(''))+
      '</tbody></table>'+
    '</div>';
  document.getElementById('main-content').innerHTML = html;
}

function openMatchModal() {
  var activeB = allBiz.filter(function(b){return b.status==='active';});
  var opts = activeB.map(function(b){return '<option value="'+b.id+'">'+esc(b.name)+' ('+esc(b.category||'')+')</option>';}).join('');
  document.getElementById('mmatch-a').innerHTML = '<option value="">Select Business A...</option>'+opts;
  document.getElementById('mmatch-b').innerHTML = '<option value="">Select Business B...</option>'+opts;
  document.getElementById('mmatch-reason').value='';
  document.getElementById('mmatch-score').value='85';
  document.getElementById('mmatch-err').style.display='none';
  document.getElementById('mmatch-ok').style.display='none';
  showModal('modal-match');
}

async function createMatch() {
  var err = document.getElementById('mmatch-err');
  var ok  = document.getElementById('mmatch-ok');
  err.style.display='none'; ok.style.display='none';
  var aId = document.getElementById('mmatch-a').value;
  var bId = document.getElementById('mmatch-b').value;
  var reason = document.getElementById('mmatch-reason').value.trim();
  var score  = parseInt(document.getElementById('mmatch-score').value)||85;
  if (!aId||!bId) { err.textContent='Please select both businesses.'; err.style.display='block'; return; }
  if (aId===bId)  { err.textContent='A business cannot be matched with itself.'; err.style.display='block'; return; }
  var r = await sb.from('matches').insert({
    business_a_id: aId, business_b_id: bId,
    match_score: score, match_reason: reason||null,
    initiated_by: 'admin', status: 'pending'
  });
  if (r.error) { err.textContent='Error: '+r.error.message; err.style.display='block'; return; }
  ok.textContent='✓ Match created successfully'; ok.style.display='block';
  await loadAllData();
  setTimeout(function(){ closeAllModals(); renderMatches(); }, 1200);
}

async function deleteMatch(id) {
  if (!confirm('Delete this match?')) return;
  await sb.from('matches').delete().eq('id',id);
  renderMatches();
}

// ── CAMPAIGNS ─────────────────────────────────────────────────
async function renderCampaigns() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Loading campaigns...</div>';
  var r = await sb.from('campaigns').select('*').order('created_at',{ascending:false});
  var campaigns = r.data || [];

  document.getElementById('main-content').innerHTML =
    '<h1 class="page-title">Campaigns</h1>'+
    '<p class="page-sub">All cross-promotion campaigns across the platform.</p>'+
    '<div class="table-wrap">'+
      '<div class="table-head"><span class="table-title">'+campaigns.length+' campaigns</span></div>'+
      '<table><thead><tr>'+
        '<th>Campaign</th><th>Type</th><th>Status</th><th>Reach A</th><th>Reach B</th><th>Created</th>'+
      '</tr></thead><tbody>'+
      (campaigns.length===0?'<tr class="empty-row"><td colspan="6">No campaigns yet. Campaigns are created when matched businesses agree on terms.</td></tr>':
        campaigns.map(function(c){
          return '<tr>'+
            '<td><strong>'+(c.name||'Untitled campaign')+'</strong></td>'+
            '<td style="font-size:0.8rem">'+(c.type||'—')+'</td>'+
            '<td><span class="badge badge-'+(c.status==='active'?'active':c.status==='draft'?'pending':'starter')+'">'+c.status+'</span></td>'+
            '<td style="font-size:0.85rem">'+(c.reach_a||0)+'</td>'+
            '<td style="font-size:0.85rem">'+(c.reach_b||0)+'</td>'+
            '<td style="font-size:0.75rem;color:var(--gray-lt)">'+fmtDate(c.created_at)+'</td>'+
          '</tr>';
        }).join(''))+
      '</tbody></table>'+
    '</div>';
}

// ── WAITLIST ──────────────────────────────────────────────────
async function renderWaitlist() {
  document.getElementById('main-content').innerHTML = '<div class="loading">Loading waitlist...</div>';
  var r = await sb.from('waitlist').select('*').order('created_at',{ascending:false});
  var list = r.data || [];

  document.getElementById('main-content').innerHTML =
    '<h1 class="page-title">Waitlist</h1>'+
    '<p class="page-sub">Email signups from the landing page. Invite them to join when you\'re ready.</p>'+
    '<div class="table-wrap">'+
      '<div class="table-head">'+
        '<span class="table-title">'+list.length+' signups</span>'+
        '<button class="btn-primary" style="font-size:0.8rem;padding:0.45rem 1rem;" onclick="exportWaitlist()">Export CSV</button>'+
      '</div>'+
      '<table><thead><tr>'+
        '<th>Email</th><th>Source</th><th>Invited</th><th>Signed up</th>'+
      '</tr></thead><tbody>'+
      (list.length===0?'<tr class="empty-row"><td colspan="4">No waitlist signups yet.</td></tr>':
        list.map(function(w){
          return '<tr>'+
            '<td><strong>'+esc(w.email)+'</strong></td>'+
            '<td style="font-size:0.8rem;color:var(--gray-lt)">'+(w.source||'landing_page')+'</td>'+
            '<td style="font-size:0.78rem;color:var(--gray-lt)">'+(w.invited_at?fmtDate(w.invited_at):'<em>Not yet</em>')+'</td>'+
            '<td style="font-size:0.78rem;color:var(--gray-lt)">'+fmtDate(w.created_at)+'</td>'+
          '</tr>';
        }).join(''))+
      '</tbody></table>'+
    '</div>';
}

function exportWaitlist() {
  sb.from('waitlist').select('email,source,created_at').order('created_at',{ascending:false}).then(function(r){
    var rows = ['Email,Source,Signed up'].concat((r.data||[]).map(function(w){
      return '"'+w.email+'","'+(w.source||'')+'","'+fmtDate(w.created_at)+'"';
    }));
    var blob = new Blob([rows.join('\n')],{type:'text/csv'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'promizio-waitlist.csv';
    a.click();
  });
}

// ── MODAL HELPERS ─────────────────────────────────────────────
function showModal(id) {
  document.querySelectorAll('.modal').forEach(function(m){m.style.display='none';});
  document.getElementById(id).style.display='block';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeAllModals() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.querySelectorAll('.modal').forEach(function(m){m.style.display='none';});
  editingBizId=null;
}
function closeModal(e) { if(e.target===document.getElementById('modal-overlay')) closeAllModals(); }

// ── UTILS ─────────────────────────────────────────────────────
function esc(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''; }
function fmtDate(d){ if(!d)return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
</script>
</body>
</html>
