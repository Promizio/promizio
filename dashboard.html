<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promizio — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F0F0F'/><text y='.9em' font-size='72' x='12' fill='%2352B788' font-family='serif' font-weight='700'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:     #0F0F0F;
  --sage:    #2D6A4F;
  --sage-lt: #52B788;
  --sage-bg: #F0FAF4;
  --warm:    #F9F4EE;
  --sand:    #E8E0D4;
  --white:   #FFFFFF;
  --gray:    #6B6B6B;
  --gray-lt: #A8A8A8;
  --sidebar: #0F0F0F;
}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--warm);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--sidebar);
  min-height: 100vh;
  display: flex; flex-direction: column;
  padding: 1.5rem 0;
  position: fixed; top: 0; left: 0; bottom: 0;
}
.sidebar-logo {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem; font-weight: 700;
  color: var(--white); letter-spacing: -0.03em;
  padding: 0 1.5rem 1.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 1rem;
}
.sidebar-logo span { color: var(--sage-lt); }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0.7rem 1.5rem;
  font-size: 0.875rem; font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-decoration: none; cursor: pointer;
  transition: all 0.15s; border-radius: 0;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
.nav-item.active { color: var(--white); border-left-color: var(--sage-lt); background: rgba(82,183,136,0.08); }
.nav-icon { font-size: 1rem; width: 20px; text-align: center; }
.sidebar-bottom {
  margin-top: auto;
  padding: 1rem 1.5rem;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.biz-name {
  font-size: 0.8rem; font-weight: 500;
  color: rgba(255,255,255,0.6); margin-bottom: 0.5rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.logout-btn {
  font-size: 0.78rem; color: rgba(255,255,255,0.3);
  background: none; border: none; cursor: pointer;
  padding: 0; text-align: left;
  transition: color 0.2s;
}
.logout-btn:hover { color: rgba(255,255,255,0.7); }

/* ── MAIN ── */
.main {
  margin-left: 240px;
  flex: 1; padding: 2.5rem;
  min-height: 100vh;
}
.page-title {
  font-family: 'Fraunces', serif;
  font-size: 1.75rem; font-weight: 700;
  letter-spacing: -0.03em; margin-bottom: 0.25rem;
}
.page-sub { font-size: 0.875rem; color: var(--gray); margin-bottom: 2rem; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
.stat-card {
  background: var(--white);
  border: 1px solid var(--sand);
  border-radius: 14px; padding: 1.25rem 1.5rem;
}
.stat-label { font-size: 0.75rem; font-weight: 500; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
.stat-value { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; }
.stat-sub { font-size: 0.75rem; color: var(--gray-lt); margin-top: 0.25rem; }

/* Section */
.section { margin-bottom: 2rem; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.section-title { font-size: 1rem; font-weight: 600; }
.section-link { font-size: 0.8rem; color: var(--sage); text-decoration: none; }
.section-link:hover { text-decoration: underline; }

/* Match cards */
.matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
.match-card {
  background: var(--white);
  border: 1px solid var(--sand);
  border-radius: 14px; padding: 1.25rem;
  transition: transform 0.15s, box-shadow 0.15s;
}
.match-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.match-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.match-score {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem; font-weight: 700; color: var(--sage-lt);
}
.match-score-label { font-size: 0.7rem; color: var(--gray-lt); }
.score-badge {
  text-align: right;
}
.match-biz { font-size: 0.95rem; font-weight: 600; margin-bottom: 2px; }
.match-cat { font-size: 0.78rem; color: var(--gray); margin-bottom: 0.75rem; }
.match-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1rem; }
.tag {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 100px;
  background: var(--sage-bg); color: var(--sage);
  border: 1px solid rgba(45,106,79,0.15);
}
.match-actions { display: flex; gap: 8px; }
.btn-accept {
  flex: 1; padding: 0.6rem;
  background: var(--sage); color: var(--white);
  border: none; border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.8rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.btn-accept:hover { background: var(--sage-lt); color: var(--ink); }
.btn-decline {
  padding: 0.6rem 1rem;
  background: transparent; color: var(--gray);
  border: 1px solid var(--sand); border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.btn-decline:hover { border-color: var(--ink); color: var(--ink); }

/* Empty state */
.empty {
  text-align: center; padding: 3rem 2rem;
  background: var(--white); border: 1px solid var(--sand);
  border-radius: 14px;
}
.empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.empty h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
.empty p { font-size: 0.875rem; color: var(--gray); line-height: 1.6; }

/* Profile incomplete banner */
.banner {
  background: #FFFBEB; border: 1px solid #FDE68A;
  border-radius: 12px; padding: 1rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2rem; gap: 1rem;
}
.banner p { font-size: 0.875rem; color: #92400E; }
.banner a {
  font-size: 0.8rem; font-weight: 600; color: #92400E;
  text-decoration: none; white-space: nowrap;
  border: 1px solid #FDE68A; padding: 0.4rem 0.9rem;
  border-radius: 6px; transition: background 0.2s;
}
.banner a:hover { background: #FEF3C7; }

/* Loading */
.loading { text-align: center; padding: 3rem; color: var(--gray-lt); font-size: 0.875rem; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">Promiz<span>io</span></div>
  <a class="nav-item active" onclick="navTo('dashboard', this)"><span class="nav-icon">⬡</span> Dashboard</a>
  <a class="nav-item" onclick="navTo('matches', this)"><span class="nav-icon">🔗</span> Matches</a>
  <a class="nav-item" onclick="navTo('campaigns', this)"><span class="nav-icon">📢</span> Campaigns</a>
  <a class="nav-item" onclick="navTo('profile', this)"><span class="nav-icon">🏢</span> My Profile</a>
  <div class="sidebar-bottom">
    <div class="biz-name" id="sidebar-biz-name">Loading...</div>
    <button class="logout-btn" onclick="logout(); return false;">Log out</button>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main" id="main-content">
  <div class="loading">Loading your dashboard...</div>
</main>

<script>
const SUPABASE_URL = 'https://usewjkpcpionmapqxvoz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_60i4tQGeBhRNwwtImJ8SRQ_F-9doWcY';
let supabase;
let currentBusiness = null;

// Load Supabase dynamically then init
(function() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
  s.onload = function() {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    init();
  };
  s.onerror = function() {
    document.getElementById('main-content').innerHTML = '<div class="loading">Could not load — please refresh the page.</div>';
  };
  document.head.appendChild(s);
})();

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }
  await loadBusiness(session.user.id);
  showPage('dashboard');
}

async function loadBusiness(userId) {
  const { data } = await supabase
    .from('businesses')
    .select('*')
    .eq('user_id', userId)
    .single();
  currentBusiness = data;
  if (data) document.getElementById('sidebar-biz-name').textContent = data.name || 'Your business';
}

function showPage(page) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (page === 'dashboard') renderDashboard();
  if (page === 'matches')   renderMatches();
  if (page === 'campaigns') renderCampaigns();
  if (page === 'profile')   renderProfile();
}

function navTo(page, el) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  showPage(page);
}

function renderDashboard() {
  const incomplete = !currentBusiness?.category || currentBusiness?.status === 'pending';
  document.getElementById('main-content').innerHTML = `
    ${incomplete ? `
    <div class="banner">
      <p>⚡ Complete your business profile to start getting matched with partners.</p>
      <a href="/signup.html">Complete profile →</a>
    </div>` : ''}
    <h1 class="page-title">Good to see you${currentBusiness?.name ? ', ' + currentBusiness.name.split(' ')[0] : ''}.</h1>
    <p class="page-sub">Here's what's happening with your partnerships.</p>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Matches</div>
        <div class="stat-value">0</div>
        <div class="stat-sub">Waiting for you</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active campaigns</div>
        <div class="stat-value">0</div>
        <div class="stat-sub">In progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total reach</div>
        <div class="stat-value">—</div>
        <div class="stat-sub">Across all campaigns</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Redemptions</div>
        <div class="stat-value">—</div>
        <div class="stat-sub">Tracked conversions</div>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <span class="section-title">Your matches</span>
      </div>
      <div class="empty">
        <div class="empty-icon">🔗</div>
        <h3>No matches yet</h3>
        <p>We're finding the right partners for you.<br>Check back soon — or complete your profile to speed things up.</p>
      </div>
    </div>
  `;
}

function renderMatches() {
  document.getElementById('main-content').innerHTML = `
    <h1 class="page-title">Your matches.</h1>
    <p class="page-sub">Businesses we think would be a great fit for cross-promotion.</p>
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <h3>We're working on your matches</h3>
      <p>Our matching engine is finding complementary businesses for you.<br>You'll get a notification as soon as your first match is ready.</p>
    </div>
  `;
}

function renderCampaigns() {
  document.getElementById('main-content').innerHTML = `
    <h1 class="page-title">Campaigns.</h1>
    <p class="page-sub">Your active and past cross-promotion campaigns.</p>
    <div class="empty">
      <div class="empty-icon">📢</div>
      <h3>No campaigns yet</h3>
      <p>Once you accept a match, you'll be able to launch your first campaign here.</p>
    </div>
  `;
}

function renderProfile() {
  if (!currentBusiness) return;
  document.getElementById('main-content').innerHTML = `
    <h1 class="page-title">My profile.</h1>
    <p class="page-sub">How your business appears to potential partners.</p>
    <div style="background:var(--white);border:1px solid var(--sand);border-radius:16px;padding:2rem;max-width:600px;">
      <div style="margin-bottom:1.25rem;">
        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray-lt);margin-bottom:0.3rem;">Business name</div>
        <div style="font-size:1rem;font-weight:500;">${currentBusiness.name || '—'}</div>
      </div>
      <div style="margin-bottom:1.25rem;">
        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray-lt);margin-bottom:0.3rem;">Category</div>
        <div style="font-size:1rem;">${currentBusiness.category || '—'}${currentBusiness.subcategory ? ' → ' + currentBusiness.subcategory : ''}</div>
      </div>
      <div style="margin-bottom:1.25rem;">
        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray-lt);margin-bottom:0.3rem;">Business type</div>
        <div style="font-size:1rem;">${currentBusiness.business_type || '—'}</div>
      </div>
      <div style="margin-bottom:1.25rem;">
        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray-lt);margin-bottom:0.3rem;">Target audience</div>
        <div style="font-size:1rem;">${currentBusiness.target_gender || 'All'} · Ages ${currentBusiness.target_age_min || '?'}–${currentBusiness.target_age_max || '?'} · ${currentBusiness.target_location || '—'}</div>
      </div>
      <div style="margin-bottom:1.5rem;">
        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray-lt);margin-bottom:0.3rem;">Promotion types</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${(currentBusiness.promo_types || []).map(t => `<span style="font-size:0.78rem;padding:2px 10px;border-radius:100px;background:var(--sage-bg);color:var(--sage);border:1px solid rgba(45,106,79,0.15);">${t}</span>`).join('') || '—'}
        </div>
      </div>
      <div style="margin-bottom:0;">
        <div style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray-lt);margin-bottom:0.3rem;">Status</div>
        <div style="font-size:1rem;">${currentBusiness.status || '—'}</div>
      </div>
    </div>
  `;
}

async function logout() {
  try { if (supabase) await supabase.auth.signOut(); } catch(e) {}
  Object.keys(localStorage).forEach(function(k) { if (k.startsWith('sb-')) localStorage.removeItem(k); });
  window.location.href = '/login.html';
}

init();
</script>
</body>
</html>
