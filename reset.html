<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promizio — Set new password</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F0F0F'/><text y='.9em' font-size='72' x='12' fill='%2352B788' font-family='serif' font-weight='700'>P</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#0F0F0F;--sage:#2D6A4F;--sage-lt:#52B788;--sage-bg:#F0FAF4;--warm:#F9F4EE;--sand:#E8E0D4;--white:#FFFFFF;--gray:#6B6B6B;--red:#DC2626;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--warm);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
nav{padding:1.25rem 2.5rem;display:flex;align-items:center;justify-content:space-between;background:var(--white);border-bottom:1px solid var(--sand);}
.logo{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-0.03em;}
.logo span{color:var(--sage-lt);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--white);border:1px solid var(--sand);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.card-title{font-family:'Fraunces',serif;font-size:1.75rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:0.4rem;}
.card-sub{font-size:0.875rem;color:var(--gray);margin-bottom:2rem;line-height:1.5;}
.field{margin-bottom:1.25rem;}
label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.4rem;color:var(--ink);}
input[type="password"],input[type="text"]{width:100%;padding:0.85rem 1rem;border:1.5px solid var(--sand);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.9rem;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--sage-lt);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:3rem;}
.pw-toggle{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:var(--gray);font-size:1rem;transition:color 0.2s;}
.pw-toggle:hover{color:var(--ink);}
.btn{width:100%;padding:0.9rem;background:var(--sage);color:var(--white);border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;}
.btn:hover{background:var(--sage-lt);color:var(--ink);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{display:none;border-radius:8px;padding:0.75rem 1rem;font-size:0.85rem;margin-bottom:1rem;}
.msg-error{background:#FEF2F2;border:1px solid #FECACA;color:var(--red);}
.msg-success{background:var(--sage-bg);border:1px solid rgba(45,106,79,0.2);color:var(--sage);}
</style>
</head>
<body>
<nav><a href="/" class="logo">Promiz<span>io</span></a></nav>
<main>
  <div class="card">
    <div class="msg msg-error"   id="err"></div>
    <div class="msg msg-success" id="ok"></div>
    <h1 class="card-title">Set new password.</h1>
    <p class="card-sub">Choose a strong password for your Promizio account.</p>
    <div class="field">
      <label>New password</label>
      <div class="pw-wrap">
        <input type="password" id="pw1" placeholder="Min. 8 characters">
        <button type="button" class="pw-toggle" onclick="togglePw('pw1',this)">👁</button>
      </div>
    </div>
    <div class="field">
      <label>Confirm new password</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="Repeat password">
        <button type="button" class="pw-toggle" onclick="togglePw('pw2',this)">👁</button>
      </div>
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Set new password</button>
  </div>
</main>
<script>
var SB_URL='https://usewjkpcpionmapqxvoz.supabase.co';
var SB_KEY='sb_publishable_60i4tQGeBhRNwwtImJ8SRQ_F-9doWcY';
var sb;
(function(){
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
  s.onload=function(){ sb=window.supabase.createClient(SB_URL,SB_KEY); };
  document.head.appendChild(s);
})();
function togglePw(id,btn){var i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁':'🙈';}
async function doReset(){
  var err=document.getElementById('err'); err.style.display='none';
  var ok=document.getElementById('ok');   ok.style.display='none';
  var pw1=document.getElementById('pw1').value;
  var pw2=document.getElementById('pw2').value;
  if(pw1.length<8){err.textContent='Password must be at least 8 characters.';err.style.display='block';return;}
  if(pw1!==pw2){err.textContent='Passwords do not match.';err.style.display='block';return;}
  var btn=document.getElementById('reset-btn');btn.textContent='Saving...';btn.disabled=true;
  try{
    var r=await sb.auth.updateUser({password:pw1});
    if(r.error){err.textContent=r.error.message;err.style.display='block';btn.textContent='Set new password';btn.disabled=false;return;}
    ok.textContent='Password updated! Redirecting to login...';ok.style.display='block';
    setTimeout(function(){window.location.href='/login.html';},2000);
  }catch(e){err.textContent='Something went wrong: '+e.message;err.style.display='block';btn.textContent='Set new password';btn.disabled=false;}
}
</script>
</body>
</html>
